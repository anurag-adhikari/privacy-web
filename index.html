  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Cleaner | Clean files before sharing</title>
    <meta
      name="description"
      content="Privacy Cleaner helps remove photo metadata, blur screenshots, redact PDFs, and clean documents before sharing. No account, no tracking, no data stored."
    />
    <link rel="canonical" href="https://privacycleaner.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Privacy Cleaner" />
    <meta property="og:description" content="Clean photos, screenshots, and PDFs before sharing. No account, no tracking, no data stored." />
    <meta property="og:image" content="https://privacycleaner.app/social-preview.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Privacy Cleaner" />
    <meta name="twitter:description" content="Clean photos, screenshots, and PDFs before sharing." />
    <meta name="twitter:image" content="https://privacycleaner.app/social-preview.svg" />
    <meta name="theme-color" content="#f7f3ea" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#121516" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Privacy Cleaner",
        "applicationCategory": "SecurityApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "description": "Clean photos, screenshots, and PDFs before sharing with privacy-first local workflows."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Does Privacy Cleaner need an account?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. The core product is designed for static hosting and browser-based sessions."
            }
          },
          {
            "@type": "Question",
            "name": "What files can be cleaned?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Privacy Cleaner covers photos, screenshots, and PDFs, including metadata removal, screenshot masking, PDF redaction workflows, page removal, and export checks."
            }
          },
          {
            "@type": "Question",
            "name": "Is PDF redaction automatic?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The interface supports true-redaction workflows, but users should review output before sharing. Hidden text must be removed, not just covered visually."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
